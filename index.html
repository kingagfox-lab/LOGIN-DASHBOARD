<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .dashboard-wrapper {
            position: relative;
            width: 800px;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 50px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            z-index: 10;
            overflow-y: auto;
            color: #fff;
            animation: popup 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .dashboard-wrapper h2 {
            font-size: 2.6em;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            font-weight: 700;
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            text-align: left;
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.05em;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            color: #d19ff5;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        tr {
            transition: 0.2s ease;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.15);
        }

        .header-top {
            display: flex;
            align-items: center;
            position: relative;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #d19ff5;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            font-size: 1.1em;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .back-btn ion-icon {
            margin-right: 8px;
            font-size: 1.3em;
        }

        .back-btn:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transform: translateY(-50%) translateX(-5px);
        }

        .empty-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.7);
        }

        .dashboard-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .dashboard-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .dashboard-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .dashboard-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="stars"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="mountainsLayer"></div>
        <div class="treesLayer"></div>
    </div>

    <div class="dashboard-wrapper">
        <div class="header-top">
            <a href="https://kingagfox-lab.github.io/login-page-pertama/" class="back-btn"><ion-icon name="arrow-back-outline"></ion-icon> Back</a>
            <h2>Registered Users</h2>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tbody = document.getElementById('userTableBody');
            const database = JSON.parse(localStorage.getItem('userDatabase')) || [];

            if (database.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">No users registered yet.</td></tr>';
            } else {
                database.forEach(user => {
                    const tr = document.createElement('tr');

                    const tdUsername = document.createElement('td');
                    tdUsername.textContent = user.username || 'System Admin';

                    const tdEmail = document.createElement('td');
                    tdEmail.textContent = user.email;

                    const tdPassword = document.createElement('td');
                    tdPassword.textContent = user.password;

                    tr.appendChild(tdUsername);
                    tr.appendChild(tdEmail);
                    tr.appendChild(tdPassword);

                    tbody.appendChild(tr);
                });
            }
        });
    </script>
</body>

</html>
